name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PWDOCTOR_PUBLISH_BUILD: '1'

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        timeout-minutes: 10

      - name: Prepare publish build
        run: npm run build
        env:
          PWDOCTOR_PUBLISH_BUILD: '1'

      - name: Pack and smoke CLI tarball
        run: |
          set -euo pipefail

          cd packages/cli
          TARBALL_NAME="$(npm pack --json | node -e "const fs = require('node:fs'); const pack = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(pack[0].filename);")"
          TARBALL_PATH="$(pwd)/$TARBALL_NAME"

          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install "$TARBALL_PATH"
          node node_modules/.bin/pw-doctor --help | tee help.txt
          grep -q "Usage: pw-doctor" help.txt

      - name: Publish
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
