name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs so rapid pushes don't stack up the Node matrix.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full Node 20+22 matrix on main pushes; PRs run Node 22 only (the engines
  # floor is still exercised on main before release, so PRs needn't pay 2x).
  matrix-config:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.pick.outputs.node }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "node=['20','22']" >> "$GITHUB_OUTPUT"
          else
            echo "node=['22']" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: build / typecheck / lint / test (Node ${{ matrix.node }})
    needs: matrix-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(needs.matrix-config.outputs.node) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # Runs only on main pushes — verifies the CLI tarball builds cleanly
  # without dev artifacts before any release.
  package-smoke:
    name: package smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Pack CLI
        run: |
          cd packages/cli
          npm pack --dry-run
