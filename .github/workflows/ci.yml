name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs so rapid pushes don't stack up the Node matrix.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full Node 20+22 matrix on main pushes; PRs run Node 22 only (the engines
  # floor is still exercised on main before release, so PRs needn't pay 2x).
  matrix-config:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.pick.outputs.node }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "node=['20','22']" >> "$GITHUB_OUTPUT"
          else
            echo "node=['22']" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: build / typecheck / lint / test (Node ${{ matrix.node }})
    needs: matrix-config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(needs.matrix-config.outputs.node) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # Runs only on main pushes — verifies the CLI tarball builds cleanly
  # and installs in a clean project before any release.
  package-smoke:
    name: package smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Pack and smoke CLI tarball
        run: |
          set -euo pipefail

          cd packages/cli
          TARBALL_NAME="$(npm pack --json | node -e "const fs = require('node:fs'); const pack = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(pack[0].filename);")"
          TARBALL_PATH="$(pwd)/$TARBALL_NAME"

          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install "$TARBALL_PATH"
          node node_modules/.bin/pw-doctor --help | tee help.txt
          grep -q "Usage: pw-doctor" help.txt
